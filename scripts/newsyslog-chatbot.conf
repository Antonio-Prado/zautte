# Configurazione newsyslog per il chatbot comunale
# Copiare in /etc/newsyslog.conf.d/chatbot.conf
#
# Formato colonne:
# logfile          owner:group  mode  count  size(KB)  when  flags

/var/log/chatbot.log         root:wheel  640  14  51200  *  J
/var/log/chatbot-sync.log    root:wheel  640  14  102400  *  J
/var/log/chatbot-crawler.log root:wheel  640  14  51200  *  J
/var/log/chatbot-indexer.log root:wheel  640  14  51200  *  J
